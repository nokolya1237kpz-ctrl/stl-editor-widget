<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>✂️ STL Мастер</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.min.js"></script>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <a href="https://vk.com/pechatdlyadoma" target="_blank" rel="noopener" class="community-link">
      <span aria-hidden="true">↗</span>
      <span>Сообщество «Печать для дома»</span>
    </a>
    <h1>✂️ STL Мастер</h1>
    <p class="subtitle">Редактор STL, генератор брелков и CAD-конструктор</p>
  </header>

  <!-- TABS -->
  <div class="tabs" role="tablist">
    <button class="tab-btn active" onclick="switchTab('editor')" role="tab" aria-selected="true">✂️ Редактор</button>
    <button class="tab-btn" onclick="switchTab('keychain')" role="tab" aria-selected="false">🔑 Брелок</button>
    <button class="tab-btn" onclick="switchTab('cad')" role="tab" aria-selected="false">🧱 CAD</button>
  </div>

  <!-- EDITOR -->
  <section id="panel-editor" class="card tab-panel" role="tabpanel">
    <h2>✂️ Редактирование STL</h2>
    <div class="file-drop" id="fileDrop" role="button" tabindex="0">
      📁 Нажмите или перетащите STL сюда
      <input type="file" id="stlFile" accept=".stl" hidden>
    </div>
    <div id="editorControls" class="hidden">
      <label for="action">Действие</label>
      <select id="action" onchange="toggleParams()">
        <option value="text">📝 Добавить текст</option>
        <option value="hole">🕳️ Вырезать отверстие</option>
        <option value="eyes">👁️ Добавить глаза</option>
        <option value="cut_box">✂️ Вырез кубом</option>
      </select>

      <!-- TEXT -->
      <div id="params-text">
        <label for="editText">Текст</label>
        <input type="text" id="editText" value="VK" maxlength="50">
        <label for="fontSize">Размер шрифта (мм)</label>
        <input type="number" id="fontSize" value="8" min="4" max="16">
        <label for="textDepth">Глубина (мм)</label>
        <input type="number" id="textDepth" value="1" step="0.1" min="0.2" max="3">
        <label for="textMode">Режим</label>
        <select id="textMode">
          <option value="cut">🔻 Вырезанный</option>
          <option value="emboss">🔺 Выпуклый</option>
        </select>
        <label>Смещение по поверхности</label>
        <div class="row">
          <div><small>X (мм)</small><input type="number" id="offsetX" value="0" step="1" min="-50" max="50"></div>
          <div><small>Y (мм)</small><input type="number" id="offsetY" value="0" step="1" min="-50" max="50"></div>
        </div>
      </div>

      <!-- HOLE -->
      <div id="params-hole" class="hidden">
        <label for="holeRadius">Радиус отверстия (мм)</label>
        <input type="number" id="holeRadius" value="2" step="0.5" min="1" max="15">
        <label for="holeDepth">Глубина (0 = сквозное)</label>
        <input type="number" id="holeDepth" value="0" min="0" max="100">
        <label>Смещение по поверхности</label>
        <div class="row">
          <div><small>X (мм)</small><input type="number" id="offsetX" value="0" step="1" min="-50" max="50"></div>
          <div><small>Y (мм)</small><input type="number" id="offsetY" value="0" step="1" min="-50" max="50"></div>
        </div>
      </div>

      <!-- EYES -->
      <div id="params-eyes" class="hidden">
        <label for="eyeRadius">Радиус глаза (мм)</label>
        <input type="number" id="eyeRadius" value="2" min="1" max="8">
        <label for="eyeDistance">Расстояние (мм)</label>
        <input type="number" id="eyeDistance" value="10" min="5" max="40">
        <label>Смещение по поверхности</label>
        <div class="row">
          <div><small>X (мм)</small><input type="number" id="offsetX" value="0" step="1" min="-50" max="50"></div>
          <div><small>Y (мм)</small><input type="number" id="offsetY" value="0" step="1" min="-50" max="50"></div>
        </div>
      </div>

      <!-- CUT BOX -->
      <div id="params-cut_box" class="hidden">
        <label for="cutX">Ширина (мм)</label>
        <input type="number" id="cutX" value="5" min="1" max="50">
        <label for="cutY">Высота (мм)</label>
        <input type="number" id="cutY" value="5" min="1" max="50">
        <label for="cutZ">Глубина (мм)</label>
        <input type="number" id="cutZ" value="5" min="1" max="50">
      </div>

      <button id="btnProcess" onclick="processSTL()">⚡ Применить изменения</button>
    </div>
  </section>

  <!-- KEYCHAIN -->
  <section id="panel-keychain" class="card tab-panel hidden" role="tabpanel">
    <h2>🔑 Генератор брелков</h2>
    <label for="keyText">Текст</label>
    <input type="text" id="keyText" value="VK" maxlength="50">
    <label for="keyLanguage">Язык текста</label>
    <select id="keyLanguage">
      <option value="auto">🌐 Авто</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="en">🇬🇧 English</option>
    </select>
    <label for="keyShape">Форма</label>
    <select id="keyShape">
      <option value="rect">📦 Прямоугольник</option>
      <option value="round">🔵 Овал</option>
      <option value="heart">❤️ Сердце</option>
    </select>
    <div class="row">
      <div><label for="keyWidth">Ширина (мм)</label><input type="number" id="keyWidth" value="50" min="30" max="80"></div>
      <div><label for="keyHeight">Высота (мм)</label><input type="number" id="keyHeight" value="30" min="20" max="60"></div>
    </div>
    <div class="row">
      <div><label for="keyThick">Толщина (мм)</label><input type="number" id="keyThick" value="3" min="2" max="6" step="0.5"></div>
      <div><label for="keyFontSize">Размер текста</label><input type="number" id="keyFontSize" value="10" min="4" max="16"></div>
    </div>
    <label for="keyTextMode">Режим текста</label>
    <select id="keyTextMode">
      <option value="cut">🔻 Вырезанный</option>
      <option value="emboss">🔺 Выпуклый</option>
    </select>
    <div class="control-row">
      <label for="keyHoleDiameter">Размер отверстия: <span id="keyHoleDiameterValue">4 мм</span></label>
      <input type="range" id="keyHoleDiameter" value="4" min="2" max="18" step="0.5" oninput="updateKeychainControls()">
    </div>
    <div id="heartHoleControls" class="hidden">
      <label>Позиция отверстия на сердце</label>
      <div class="row">
        <div>
          <small>X (мм)</small>
          <input type="number" id="keyLoopX" value="-7" step="0.5" min="-30" max="30">
        </div>
        <div>
          <small>Y (мм)</small>
          <input type="number" id="keyLoopY" value="4" step="0.5" min="-30" max="30">
        </div>
      </div>
    </div>
    <button id="btnGenerate" onclick="generateKeychain()">🖨️ Сгенерировать STL</button>
  </section>

  <!-- CAD -->
  <section id="panel-cad" class="card tab-panel hidden" role="tabpanel">
    <h2>🧱 CAD Конструктор</h2>
    <div id="cadObjects"></div>
    <button onclick="addCadObject()">➕ Добавить объект</button>
    <button onclick="buildCadModel()">🖨️ Собрать STL</button>
  </section>

  <!-- VIEWER -->
  <section class="card">
    <h2>📦 3D Просмотр</h2>
    <img id="previewImg" class="preview-img" alt="2D Preview">
    <div id="viewer" class="viewer" aria-label="3D модель"></div>
    <div id="status" class="status" role="status" aria-live="polite">✅ Готово</div>
    <button id="btnDownload" class="hidden success" onclick="downloadSTL()">💾 Скачать STL</button>
  </section>

</div>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✂️ STL Мастер</title>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

  <link rel="stylesheet" href="style.css" />

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.min.js"></script>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <a href="https://vk.com/pechatdlyadoma" target="_blank" class="community-link">
      ← Сообщество «Печать для дома»
    </a>

    <h1>✂️ STL Мастер</h1>
    <p class="subtitle">
      Редактор STL, генератор брелков и CAD-конструктор
    </p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('editor')">
      ✂️ Редактор
    </button>

    <button class="tab-btn" onclick="switchTab('keychain')">
      🔑 Брелок
    </button>

    <button class="tab-btn" onclick="switchTab('cad')">
      🧱 CAD
    </button>
  </div>

  <!-- EDITOR -->
  <section id="panel-editor" class="card tab-panel">

    <h2>✂️ Редактирование STL</h2>

    <div class="file-drop" id="fileDrop">
      📁 Нажмите или перетащите STL сюда
      <input type="file" id="stlFile" accept=".stl" hidden>
    </div>

    <div id="editorControls" class="hidden">

      <label>Действие</label>

      <select id="action" onchange="toggleParams()">
        <option value="text">📝 Добавить текст</option>
        <option value="hole">🕳️ Вырезать отверстие</option>
        <option value="eyes">👁️ Добавить глаза</option>
        <option value="cut_box">✂️ Вырез кубом</option>
      </select>

      <!-- TEXT -->
      <div id="params-text">

        <label>Текст</label>
        <input type="text" id="editText" value="VK">

        <label>Размер шрифта</label>
        <input type="number" id="fontSize" value="8">

        <label>Глубина</label>
        <input type="number" id="textDepth" value="1" step="0.1">

        <label>Режим</label>
        <select id="textMode">
          <option value="cut">🔻 Вырезанный</option>
          <option value="emboss">🔺 Выпуклый</option>
        </select>

      </div>

      <!-- HOLE -->
      <div id="params-hole" class="hidden">

        <label>Радиус отверстия</label>
        <input type="number" id="holeRadius" value="2" step="0.5">

        <label>Глубина</label>
        <input type="number" id="holeDepth" value="0">

      </div>

      <!-- EYES -->
      <div id="params-eyes" class="hidden">

        <label>Радиус глаза</label>
        <input type="number" id="eyeRadius" value="2">

        <label>Расстояние</label>
        <input type="number" id="eyeDistance" value="10">

      </div>

      <!-- CUT -->
      <div id="params-cut_box" class="hidden">

        <label>Ширина</label>
        <input type="number" id="cutX" value="5">

        <label>Высота</label>
        <input type="number" id="cutY" value="5">

        <label>Глубина</label>
        <input type="number" id="cutZ" value="5">

      </div>

      <button id="btnProcess" onclick="processSTL()">
        ⚡ Применить изменения
      </button>

    </div>

  </section>

  <!-- KEYCHAIN -->
  <section id="panel-keychain" class="card tab-panel hidden">

    <h2>🔑 Генератор брелков</h2>

    <label>Текст</label>
    <input type="text" id="keyText" value="VK">

    <label>Форма</label>
    <select id="keyShape">
      <option value="rect">📦 Прямоугольник</option>
      <option value="round">🔵 Овал</option>
      <option value="heart">❤️ Сердце</option>
    </select>

    <div class="row">
      <div>
        <label>Ширина</label>
        <input type="number" id="keyWidth" value="50">
      </div>

      <div>
        <label>Высота</label>
        <input type="number" id="keyHeight" value="30">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Толщина</label>
        <input type="number" id="keyThick" value="3">
      </div>

      <div>
        <label>Размер текста</label>
        <input type="number" id="keyFontSize" value="10">
      </div>
    </div>

    <label>Режим текста</label>

    <select id="keyTextMode">
      <option value="cut">🔻 Вырезанный</option>
      <option value="emboss">🔺 Выпуклый</option>
    </select>

    <button id="btnGenerate" onclick="generateKeychain()">
      🖨️ Сгенерировать STL
    </button>

  </section>

  <!-- CAD -->
  <section id="panel-cad" class="card tab-panel hidden">

    <h2>🧱 CAD Конструктор</h2>

    <div id="cadObjects"></div>

    <button onclick="addCadObject()">
      ➕ Добавить объект
    </button>

    <button onclick="buildCadModel()">
      🖨️ Собрать STL
    </button>

  </section>

  <!-- VIEWER -->
  <section class="card">

    <h2>📦 3D Просмотр</h2>

    <img id="previewImg" class="preview-img" alt="preview">

    <div id="viewer" class="viewer"></div>

    <div id="status" class="status">
      ✅ Готово
    </div>

    <button id="btnDownload" class="hidden" onclick="downloadSTL()">
      💾 Скачать STL
    </button>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
